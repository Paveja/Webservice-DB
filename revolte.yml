revolte:
  version: '1.0'
  project: optum
  appName: message-service
  env:
    preview:
      branch: qa
      services:
        rid_1:
          type: WEB_SERVICE
          name: previewUserService
          entryPoint: Program.cs
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              DATABASE_URL: '#{previewUserDatabase.dbUrl}'
              DATABASE_PORT: '#{previewUserDatabase.dbPort}'
              DATABASE_USERNAME: '#{previewUserDatabase.dbUsername}'
              DATABASE_PASSWORD: '#{previewUserDatabase.dbPassword}'
              DATABASE_NAME: '#{previewUserDatabase.dbName}'
              THIRD_PARTY_URL: https://testtt.requestcatcher.com/
          specifications:
            cpu: 2
            memory: 2
            storage: 30
        rid_2:
          type: DATABASE
          name: previewUserDatabase
          specifications:
            cpu: 2
            memory: 4
            storage: 50
            engine: postgres
    qa:
      branch: qa
      services:
        rid_1:
          type: WEB_SERVICE
          name: userService
          entryPoint: Program.cs
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              DATABASE_URL: '#{userDatabase.dbUrl}'
              DATABASE_PORT: '#{userDatabase.dbPort}'
              DATABASE_USERNAME: '#{userDatabase.dbUsername}'
              DATABASE_PASSWORD: '#{userDatabase.dbPassword}'
              DATABASE_NAME: '#{userDatabase.dbName}'
              THIRD_PARTY_URL: https://testtt.requestcatcher.com/
          specifications:
            cpu: 2
            memory: 2
            storage: 30
        rid_2:
          type: DATABASE
          name: userDatabase
          specifications:
            cpu: 2
            memory: 4
            storage: 50
            engine: mysql