revolte:
  version: "1.0"
  project: light
  appName: message-service
  env:
    qa:
      branch: qa
      services:
        rid_1:
          type: WEB_SERVICE
          name: userService
          entryPoint: Program.cs
          properties:
            loadBalancerMode: "shared"
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              DATABASE_URL: "#{userDatabase.dbUrl}"
              DATABASE_PORT: "#{userDatabase.dbPort}"
              DATABASE_USERNAME: "#{userDatabase.dbUsername}"
              DATABASE_PASSWORD: "#{userDatabase.dbPassword}"
              DATABASE_NAME: "#{userDatabase.dbName}"
              THIRD_PARTY_URL: https://testtt.requestcatcher.com/
          specifications:
            cpu: 2
            memory: 4
            storage: 30
            autoScaling:
              replica:
                min: 1
                max: 3
        rid_2:
          type: DATABASE
          name: userDatabase
          specifications:
            cpu: 2
            memory: 4
            storage: 50
            engine: mysql