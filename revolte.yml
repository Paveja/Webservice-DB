revolte:
  version: "1.0"
  project: "optum"
  appName: "message-service"
  env:
    qa:
      branch: "qa"
      services:
        rid_1:
          name: "web-service"
          type: "WEB_SERVICE"
          entryPoint: "index.js"
          specifications:
            cpu: 4
            memory: 32
            storage: 300
          properties:
            health: "/health"
            port: 8080
            variables:
              BASE_URL: "/api/v1"
              DATABASE_URL: "#{db.dbUrl}"
              DATABASE_PORT: "#{db.dbPort}"
              DATABASE_USERNAME: "#{db.dbUsername}"
              DATABASE_PASSWORD: "#{db.dbPassword}"
              DATABASE_NAME: "#{dbName}"
        rid_2:
          name: "db"
          type: "DATABASE"
          specifications:
            cpu: 2
            memory: 4
            storage: 50
            engine: postgres
    preview:
      services:
        rid_1:
          name: "web-service"
          type: "WEB_SERVICE"
          entryPoint: "index.js"
          specifications:
            cpu: 2
            memory: 8
            storage: 30
          properties:
            health: "/health"
            port: 8080
            variables:
              BASE_URL: "/api/v1"
              DATABASE_URL: "#{db.dbUrl}"
              DATABASE_PORT: "#{db.dbPort}"
              DATABASE_USERNAME: "#{db.dbUsername}"
              DATABASE_PASSWORD: "#{db.dbPassword}"
              DATABASE_NAME: "#{dbName}"
        rid_2:
          name: "db"
          type: "DATABASE"
          specifications:
            cpu: 2
            memory: 4
            storage: 50
            engine: postgres
